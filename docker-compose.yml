services:
  fastapi_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reranking_rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      pgvector_db:
        condition: service_started
      agentic_db:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  pgvector_db:
    image: pgvector/pgvector:pg17
    container_name: pgvector_db
    environment:
      POSTGRES_USER: arun
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reranking_rag_db
    # "HOST:CONTAINER" — the app reaches this DB internally as pgvector_db:5432.
    # The host port (left) is only for optional inspection from your laptop and is
    # set to 5440 to avoid clashing with any Postgres you already run on 5432/5433.
    ports:
      - "5440:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  agentic_db:
    image: postgres:17
    container_name: agentic_db
    environment:
      POSTGRES_USER: arun
      POSTGRES_PASSWORD: postgres
      # Init scripts run connected to this DB. Keep it as the default "postgres"
      # database so sql/seed.sql can DROP/CREATE agentic_rag_db cleanly (you can't
      # drop the database you are currently connected to).
      POSTGRES_DB: agentic_rag_db
    # Host port 5441 avoids the common 5433 (where a trainee's Postgres 17 may
    # already be running). The app reaches this DB internally as agentic_db:5432.
    ports:
      - "5441:5432"
    volumes:
      - agentic_db_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d/

volumes:
  pgvector_data:
  agentic_db_data:
