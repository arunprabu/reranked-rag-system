version: "3.8"

services:
  fastapi_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reranking_rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      pgvector_db:
        condition: service_started
      agentic_db:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  pgvector_db:
    image: pgvector/pgvector:16
    container_name: pgvector_db
    environment:
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: your_pgvector_db
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  agentic_db:
    image: postgres:16
    container_name: agentic_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: agentic_rag_db
    ports:
      - "5433:5432"
    volumes:
      - agentic_db_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d/

volumes:
  pgvector_data:
  agentic_db_data:
